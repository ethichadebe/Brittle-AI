services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: accucery
      POSTGRES_PASSWORD: accucery
      POSTGRES_DB: accucery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accucery"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://accucery:accucery@postgres:5432/accucery
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app
      - ./packages:/packages
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
      - ./packages:/packages
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
